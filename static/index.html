<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BissiMamba Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e8eaf0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 800px;
      padding: 18px 24px 14px;
      border-bottom: 1px solid #1e2330;
    }
    header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #7c8cf8;
      letter-spacing: .5px;
    }
    header p {
      font-size: .78rem;
      color: #5a6072;
      margin-top: 3px;
    }

    #status-bar {
      font-size: .72rem;
      padding: 4px 10px;
      border-radius: 12px;
      display: inline-block;
      margin-top: 6px;
      background: #1a1f2e;
      color: #5a6072;
    }
    #status-bar.ready   { color: #4ade80; background: #0d2318; }
    #status-bar.warning { color: #facc15; background: #1f1a06; }

    #chat-area {
      flex: 1;
      width: 100%;
      max-width: 800px;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: .9rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #2a3565;
      color: #dde3ff;
      border-bottom-right-radius: 4px;
    }
    .msg.bot {
      align-self: flex-start;
      background: #1a1f2e;
      color: #c8cedd;
      border-bottom-left-radius: 4px;
    }
    .msg.bot.thinking {
      color: #4b5268;
      font-style: italic;
    }
    .msg.error {
      align-self: flex-start;
      background: #2a1015;
      color: #f87171;
      border-bottom-left-radius: 4px;
    }

    .msg .label {
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 4px;
      opacity: .5;
    }

    #input-area {
      width: 100%;
      max-width: 800px;
      padding: 14px 24px 20px;
      border-top: 1px solid #1e2330;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #msg-input {
      flex: 1;
      background: #1a1f2e;
      border: 1px solid #2a3048;
      border-radius: 10px;
      color: #e8eaf0;
      font-size: .9rem;
      padding: 10px 14px;
      resize: none;
      min-height: 44px;
      max-height: 140px;
      outline: none;
      transition: border-color .2s;
      font-family: inherit;
    }
    #msg-input:focus { border-color: #4a5a9a; }
    #msg-input::placeholder { color: #3a4060; }

    #send-btn {
      background: #4a5fcc;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: .9rem;
      padding: 10px 20px;
      cursor: pointer;
      transition: background .2s, transform .1s;
      white-space: nowrap;
      height: 44px;
    }
    #send-btn:hover   { background: #5a6fdc; }
    #send-btn:active  { transform: scale(.97); }
    #send-btn:disabled { background: #2a3048; color: #4b5268; cursor: default; }
  </style>
</head>
<body>

<header>
  <h1>BissiMamba Chat</h1>
  <p>Mamba State Space Model &mdash; C implementation</p>
  <span id="status-bar">Checking status...</span>
</header>

<div id="chat-area">
  <div class="msg bot">
    <div class="label">BissiBot</div>
    Bonjour! Je suis BissiBot, un assistant base sur le modele Mamba. Comment puis-je vous aider?
  </div>
</div>

<div id="input-area">
  <textarea id="msg-input" placeholder="Ecrivez votre message..." rows="1"></textarea>
  <button id="send-btn">Envoyer</button>
</div>

<script>
  const chatArea  = document.getElementById('chat-area');
  const input     = document.getElementById('msg-input');
  const sendBtn   = document.getElementById('send-btn');
  const statusBar = document.getElementById('status-bar');

  // --- Auto-resize textarea ---
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });

  // --- Enter to send (Shift+Enter for newline) ---
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  // --- Status check ---
  async function checkStatus() {
    try {
      const r = await fetch('/api/status');
      const s = await r.json();
      if (s.chat_ready && s.trained) {
        statusBar.textContent = 'Modele entraine et pret';
        statusBar.className   = 'ready';
      } else if (!s.chat_ready) {
        statusBar.textContent = 'Chat binary manquant — executer: make mamba_chat';
        statusBar.className   = 'warning';
      } else {
        statusBar.textContent = 'Modele non entraine — executer: ./mamba_lm_train';
        statusBar.className   = 'warning';
      }
    } catch {
      statusBar.textContent = 'Serveur inaccessible';
      statusBar.className   = '';
    }
  }
  checkStatus();

  // --- Add message to UI ---
  function addMsg(role, text, extra) {
    const div = document.createElement('div');
    div.className = 'msg ' + role + (extra ? ' ' + extra : '');
    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = role === 'user' ? 'Vous' : 'BissiBot';
    div.appendChild(label);
    div.appendChild(document.createTextNode(text));
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
    return div;
  }

  // --- Send message ---
  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    addMsg('user', text);
    const thinking = addMsg('bot', 'En train de reflechir...', 'thinking');

    try {
      const resp = await fetch('/api/chat', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ message: text }),
      });
      const data = await resp.json();

      chatArea.removeChild(thinking);

      if (data.error) {
        addMsg('error', 'Erreur: ' + data.error);
      } else {
        addMsg('bot', data.reply || '(pas de reponse)');
      }
    } catch (err) {
      chatArea.removeChild(thinking);
      addMsg('error', 'Erreur reseau: ' + err.message);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }
</script>

</body>
</html>
